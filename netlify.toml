# Pandotic Hub — deployed from packages/fleet-dashboard
[build]
  base = "packages/fleet-dashboard"
  command = "cd ../.. && pnpm install && pnpm --filter @pandotic/fleet-dashboard build"
  publish = "packages/fleet-dashboard/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
