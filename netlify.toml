# Pandotic Hub — deployed from packages/fleet-dashboard
[build]
  command = "pnpm install && pnpm --filter @pandotic/fleet-dashboard... build"
  publish = "packages/fleet-dashboard/.next"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=6144"

[[plugins]]
  package = "@netlify/plugin-nextjs"
