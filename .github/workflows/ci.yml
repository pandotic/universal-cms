name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '@pandotic/universal-cms' --filter '@pandotic/team-hub' --filter '@pandotic/skill-library' typecheck
      - run: pnpm test
      - run: pnpm -r --filter '@pandotic/universal-cms' build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
