name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
      - name: Build fleet-dashboard (Hub)
        run: pnpm --filter @pandotic/fleet-dashboard build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
      - name: Build template
        run: pnpm --filter universal-cms-template build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  ai-context-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check AI_CONTEXT.md / llms.txt / llms-full.txt are in sync
        run: pnpm ai-context:check
