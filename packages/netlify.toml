[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# CORS + caching for the embeddable widget bundle
[[headers]]
  for = "/widget/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
    Cache-Control = "public, max-age=300"

# Redirect everything except static files and functions to index.html (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
