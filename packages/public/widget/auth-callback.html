<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Authenticating...</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #fafafa; color: #333; }
    .spinner { width: 24px; height: 24px; border: 3px solid #e4e4e7; border-top-color: #9333ea; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .container { display: flex; align-items: center; }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="container" id="status">
    <div class="spinner"></div>
    <span>Signing in with GitHub...</span>
  </div>

  <script>
    (async function () {
      const status = document.getElementById('status');
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');

      if (!code) {
        status.innerHTML = '<span class="error">No authorization code received.</span>';
        setTimeout(() => window.close(), 2000);
        return;
      }

      try {
        const res = await fetch('/.netlify/functions/github-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        const data = await res.json();

        if (data.access_token) {
          // Post the token back to the opener (the consuming app)
          if (window.opener) {
            window.opener.postMessage(
              { type: 'gh-auth-token', token: data.access_token },
              '*'
            );
          }
          status.innerHTML = '<span>Signed in! This window will close...</span>';
        } else {
          throw new Error(data.error || 'Token exchange failed');
        }
      } catch (err) {
        if (window.opener) {
          window.opener.postMessage(
            { type: 'gh-auth-token', token: null, error: err.message },
            '*'
          );
        }
        status.innerHTML = '<span class="error">Authentication failed: ' + err.message + '</span>';
      }

      setTimeout(() => window.close(), 1500);
    })();
  </script>
</body>
</html>
